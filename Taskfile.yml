version: "3"

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list-all

  hooks:install:
    desc: Install git hooks (pre-commit format/lint and commit-msg conventional commits)
    cmds:
      - mkdir -p .git/hooks
      - |
        cat > .git/hooks/pre-commit << 'EOF'
        #!/bin/sh
        set -e
        npm run fl
        EOF
      - chmod +x .git/hooks/pre-commit
      - |
        cat > .git/hooks/commit-msg << 'EOF'
        #!/bin/sh
        npx --no -- commitlint --edit "$1"
        EOF
      - chmod +x .git/hooks/commit-msg
    silent: true

  commitlint:
    desc: Lint the most recent commit message
    cmds:
      - npx commitlint --last --verbose

  test:
    desc: Run unit tests
    cmds:
      - npm test -- --run src/

  changelog:
    desc: Preview the next release (version bump + changelog, no writes)
    cmds:
      - npx commit-and-tag-version --dry-run

  release:
    desc: Run tests, bump semver, update CHANGELOG, tag, and publish to npm
    deps: [test]
    cmds:
      - npx commit-and-tag-version
      - npm publish

  release:patch:
    desc: Force a patch release (x.y.Z) and publish to npm
    deps: [test]
    cmds:
      - npx commit-and-tag-version --release-as patch
      - npm publish

  release:minor:
    desc: Force a minor release (x.Y.0) and publish to npm
    deps: [test]
    cmds:
      - npx commit-and-tag-version --release-as minor
      - npm publish

  release:major:
    desc: Force a major release (X.0.0) and publish to npm
    deps: [test]
    cmds:
      - npx commit-and-tag-version --release-as major
      - npm publish

  release:first:
    desc: Create the first CHANGELOG entry and tag without bumping version, then publish
    cmds:
      - npx commit-and-tag-version --first-release
      - npm publish
